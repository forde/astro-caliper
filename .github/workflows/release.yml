name: Release
on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Version and Sync README
        run: |
          pnpm changeset version
          pnpm run copy-readme

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "chore: release [skip ci]"
            git push
          fi

      - name: Build and Publish
        run: |
          pnpm run build
          # We use npm directly here to ensure we use the v11 CLI features
          npm publish ./packages/astro-caliper --access public --provenance
        env:
          # This variable tells the npm CLI to use the OIDC token from the runner
          NODE_AUTH_TOKEN: ${{ steps.setup-node.outputs.auth-token }}
