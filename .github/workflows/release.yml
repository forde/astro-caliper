name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Check if version changed
        id: version
        run: |
          PUBLISHED=$(npm view astro-caliper version 2>/dev/null || echo "0.0.0")
          CURRENT=$(node -p "require('./packages/astro-caliper/package.json').version")
          echo "published=$PUBLISHED" >> $GITHUB_OUTPUT
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          if [ "$PUBLISHED" != "$CURRENT" ]; then
            echo "should_publish=true" >> $GITHUB_OUTPUT
          else
            echo "should_publish=false" >> $GITHUB_OUTPUT
          fi

      - name: Build
        if: steps.version.outputs.should_publish == 'true'
        run: pnpm run build

      - name: Publish to npm
        if: steps.version.outputs.should_publish == 'true'
        run: npm publish ./packages/astro-caliper --access public --provenance
